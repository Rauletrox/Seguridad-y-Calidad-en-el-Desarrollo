<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Registro Médico - Veterinaria</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <header>
            <h1 th:text="'Nuevo Registro Médico para ' + ${paciente.nombre}">Nuevo Registro Médico</h1>
            <a th:href="@{/registros-medicos/paciente/} + ${paciente.id}" class="btn-back">Volver al Historial</a>
        </header>

        <main>
            <form th:action="@{/registros-medicos/guardar}" th:object="${registro}" method="post" class="form">
                <input type="hidden" th:field="*{pacienteId}" />
                <input type="hidden" th:field="*{nombrePaciente}" />

                <div class="form-group">
                    <label for="diagnostico">Diagnóstico:</label>
                    <input type="text" id="diagnostico" th:field="*{diagnostico}" required>
                </div>

                <div class="form-group">
                    <label for="tratamiento">Tratamiento:</label>
                    <textarea id="tratamiento" th:field="*{tratamiento}" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="medicamentos">Medicamentos recetados:</label>
                    <textarea id="medicamentos" th:field="*{medicamentos}" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="notas">Notas adicionales:</label>
                    <textarea id="notas" th:field="*{notas}" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-primary">Guardar Registro Médico</button>
            </form>
        </main>
    </div>
</body>

</html>
