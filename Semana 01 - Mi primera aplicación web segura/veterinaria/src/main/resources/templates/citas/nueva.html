<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Programar Nueva Cita - Veterinaria</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <header>
            <h1>Programar Nueva Cita</h1>
            <a th:href="@{/citas}" class="btn-back">Volver a la Lista</a>
        </header>

        <main>
            <div th:if="${param.error}" class="error">
                Error al programar la cita. Por favor verifique los datos.
            </div>

            <form th:action="@{/citas/guardar}" method="post" class="form">
                <div class="form-group">
                    <label for="pacienteId">Paciente:</label>
                    <select id="pacienteId" name="pacienteId" required>
                        <option value="">Seleccione un paciente...</option>
                        <option th:each="paciente : ${pacientes}" th:value="${paciente.id}"
                            th:text="${paciente.nombre} + ' - ' + ${paciente.dueno}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" name="fecha" required
                        th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                </div>

                <div class="form-group">
                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" name="hora" required value="10:00">
                </div>

                <div class="form-group">
                    <label for="motivo">Motivo de la consulta:</label>
                    <textarea id="motivo" name="motivo" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="veterinario">Veterinario asignado:</label>
                    <select id="veterinario" name="veterinario" required>
                        <option value="">Seleccione un veterinario...</option>
                        <option value="Dr. Juan Pérez">Dr. Juan Pérez</option>
                        <option value="Dra. María González">Dra. Cony Quiroz</option>
                        <option value="Dr. Carlos López">Dr. Carlos López</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Programar Cita</button>
            </form>
        </main>
    </div>
</body>

</html>
